<!DOCTYPE html>
<html lang="en" x-data="store()" x-init="init()">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0" />
    <title>{% block title %}Velvet Petals | Flower Studio{% endblock %}</title>
    <meta name="description"
        content="Velvet Petals — a premium flower studio crafting stunning arrangements for every occasion. Browse our curated collection of bouquets, roses, dried flowers, and wedding arrangements." />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#051014',
                        secondary: '#0a1e1e',
                        accent: '#8B1538',
                        gold: '#D4AF37',
                        cream: '#f3f4f6',
                        dim: '#6b7280',
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Montserrat"', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        [x-cloak] {
            display: none !important;
        }

        body {
            background-color: #051014;
            color: #f3f4f6;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a1e1e;
        }

        ::-webkit-scrollbar-thumb {
            background: #8B1538;
            border-radius: 4px;
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }

        /* Product card hover actions */
        .product-card:hover .product-actions {
            transform: translateX(0);
        }

        .product-actions {
            transform: translateX(3rem);
            transition: transform 0.3s ease;
        }

        /* Cart slide-in */
        .cart-enter {
            transform: translateX(100%);
        }

        .cart-visible {
            transform: translateX(0);
        }

        /* Fade in for hero text */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-up {
            animation: fadeUp 0.8s ease forwards;
        }

        .animate-fade-up-delay {
            animation: fadeUp 0.8s ease 0.2s forwards;
            opacity: 0;
        }

        .animate-fade-up-delay-2 {
            animation: fadeUp 0.8s ease 0.4s forwards;
            opacity: 0;
        }

        /* Product image zoom */
        .product-card img {
            transition: transform 0.7s ease, opacity 0.3s ease;
        }

        .product-card:hover img {
            transform: scale(1.1);
            opacity: 1;
        }
    </style>

    {% include 'main/partials/scripts.html' %}
</head>

<body class="min-h-screen bg-primary font-sans selection:bg-accent selection:text-white">

    {% include 'main/partials/navbar.html' %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'main/partials/footer.html' %}

    {% include 'main/partials/cart_sidebar.html' %}

</body>

</html>

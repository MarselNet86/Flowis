<!-- ===========================  CART SIDEBAR  =========================== -->

<!-- Backdrop -->
<div x-show="isCartOpen" x-cloak x-transition:enter="transition-opacity duration-300"
    x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
    x-transition:leave="transition-opacity duration-300" x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0" @click="isCartOpen = false"
    class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40"></div>

<!-- Sidebar panel -->
<div x-show="isCartOpen" x-cloak x-transition:enter="transition-transform duration-500"
    x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
    x-transition:leave="transition-transform duration-500" x-transition:leave-start="translate-x-0"
    x-transition:leave-end="translate-x-full"
    class="fixed top-0 right-0 h-full w-full md:w-[450px] bg-secondary border-l border-white/10 z-50 flex flex-col">
    <!-- Header -->
    <div class="p-8 flex justify-between items-center border-b border-white/10">
        <h2 class="text-2xl font-serif text-white">Your Selection</h2>
        <button @click="isCartOpen = false" class="text-dim hover:text-white transition-colors" aria-label="Close cart">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>

    <!-- Cart items -->
    <div class="flex-1 overflow-y-auto p-8 space-y-8">

        <!-- Empty state -->
        <div x-show="cart.length === 0" class="h-full flex flex-col items-center justify-center text-dim space-y-4">
            <span class="text-4xl">🪷</span>
            <p class="uppercase tracking-widest text-sm">Your cart is empty</p>
        </div>

        <!-- Items list -->
        <template x-for="item in cart" :key="item.id">
            <div class="flex gap-4">
                <!-- Thumbnail -->
                <div class="w-20 h-24 bg-primary overflow-hidden shrink-0">
                    <img :src="item.image" :alt="item.name" class="w-full h-full object-cover" />
                </div>

                <!-- Info -->
                <div class="flex-1 flex flex-col justify-between">
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-serif text-white" x-text="item.name"></h4>
                            <p class="text-xs text-dim mt-1" x-text="formatPrice(item.price)"></p>
                        </div>
                        <button @click="removeItem(item.id)" class="text-dim hover:text-accent transition-colors"
                            aria-label="Remove item">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>

                    <!-- Qty controls -->
                    <div class="flex items-center gap-4 mt-2">
                        <button @click="updateQty(item.id, -1)" :disabled="item.quantity <= 1"
                            class="w-6 h-6 flex items-center justify-center border border-white/20 text-white hover:border-white transition-colors text-xs disabled:opacity-40">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M18 12H6" />
                            </svg>
                        </button>
                        <span class="text-sm text-white font-mono" x-text="item.quantity"></span>
                        <button @click="updateQty(item.id, 1)"
                            class="w-6 h-6 flex items-center justify-center border border-white/20 text-white hover:border-white transition-colors text-xs">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12M6 12h12" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- Footer / Checkout -->
    <div x-show="cart.length > 0" x-cloak class="p-8 border-t border-white/10 bg-primary">
        <div class="flex justify-between items-center mb-6 text-white">
            <span class="uppercase tracking-widest text-sm">Total</span>
            <span class="font-serif text-xl" x-text="'$' + cartTotal"></span>
        </div>
        <button
            class="w-full uppercase tracking-[0.2em] text-xs font-semibold py-4 px-8 transition-all duration-300 flex items-center justify-center gap-2 bg-accent text-white hover:bg-red-900">
            Checkout
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
            </svg>
        </button>
    </div>
</div>

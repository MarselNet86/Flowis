<!-- ===========================  CATALOG  =========================== -->
<section id="catalog" class="py-24 px-6 md:px-12 lg:px-24 bg-secondary">

    <!-- Header row -->
    <div class="flex flex-col md:flex-row justify-between items-end mb-16 gap-8">
        <div>
            <h2 class="text-3xl md:text-4xl font-serif text-white mb-4">OUR COLLECTION</h2>
            <div class="w-20 h-1 bg-accent"></div>
        </div>

        <!-- Category filters -->
        <div class="flex flex-wrap gap-6 text-xs tracking-widest uppercase text-dim">
            <template x-for="cat in ['All', 'Bouquets', 'Roses', 'Dried Flowers', 'Wedding']" :key="cat">
                <button @click="activeCategory = cat"
                    :class="activeCategory === cat ? 'text-white border-accent' : 'border-transparent hover:text-white'"
                    class="pb-1 border-b transition-colors" x-text="cat"></button>
            </template>
        </div>
    </div>

    <!-- Products grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-y-16 gap-x-8">
        <template x-for="product in filteredProducts" :key="product.id">
            <div class="group relative product-card">
                <!-- Image container -->
                <div class="relative aspect-[3/4] overflow-hidden bg-primary mb-6">
                    <img :src="product.image" :alt="product.name"
                        class="w-full h-full object-cover opacity-90 group-hover:opacity-100" />

                    <!-- Hover action buttons -->
                    <div class="product-actions absolute top-4 right-4 flex flex-col gap-3">
                        <button class="p-3 bg-white text-primary hover:bg-accent hover:text-white transition-colors"
                            aria-label="Add to wishlist">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M4.318 6.318a4.5 4.5 0 016.364 0L12 7.636l1.318-1.318a4.5 4.5 0 116.364 6.364l-7.5 7.5a.75.75 0 01-1.06 0l-7.5-7.5a4.5 4.5 0 010-6.364z" />
                            </svg>
                        </button>
                        <button @click="addToCart(product)"
                            class="p-3 bg-white text-primary hover:bg-accent hover:text-white transition-colors"
                            aria-label="Add to cart">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="1.5">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0" />
                            </svg>
                        </button>
                    </div>

                    <!-- Dark overlay that clears on hover -->
                    <div
                        class="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors pointer-events-none">
                    </div>
                </div>

                <!-- Product info -->
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="text-lg font-serif text-white mb-1 group-hover:text-accent transition-colors cursor-pointer"
                            x-text="product.name"></h3>
                        <p class="text-xs text-dim tracking-wider uppercase" x-text="product.category"></p>
                    </div>
                    <span class="text-lg font-serif text-white" x-text="formatPrice(product.price)"></span>
                </div>
            </div>
        </template>
    </div>
</section>

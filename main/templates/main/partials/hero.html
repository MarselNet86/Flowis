<!-- ===========================  HERO  =========================== -->
<section class="relative w-full h-screen min-h-[700px] bg-primary overflow-hidden flex">

    <!-- Left sidebar socials -->
    <div
        class="hidden md:flex flex-col justify-end items-center w-24 h-full border-r border-white/5 pb-12 gap-8 z-20 absolute left-0 bottom-0 top-0">
        <div class="flex flex-col gap-8 text-xs text-dim tracking-widest" style="writing-mode: vertical-rl;">
            <a href="#" class="hover:text-accent transition-colors rotate-180">FACEBOOK</a>
            <a href="#" class="hover:text-accent transition-colors rotate-180">TWITTER</a>
            <a href="#" class="hover:text-accent transition-colors rotate-180">INSTAGRAM</a>
        </div>
    </div>

    <!-- Main content -->
    <div class="flex-1 relative flex items-center justify-center pl-0 md:pl-24 pr-0 md:pr-[25%] h-full">

        <!-- Decorative top-left box -->
        <div class="absolute top-0 left-0 md:left-24 w-32 md:w-64 h-32 md:h-48 bg-accent z-10 hidden md:block">
        </div>

        <!-- Background image -->
        <div class="absolute inset-0 z-0 opacity-60">
            <img src="https://images.unsplash.com/photo-1563241527-3af16059d4e8?q=80&w=2070&auto=format&fit=crop"
                alt="Dark Floral Arrangement" class="w-full h-full object-cover" />
            <div class="absolute inset-0 bg-gradient-to-r from-primary via-primary/80 to-transparent"></div>
        </div>

        <!-- Text content -->
        <div class="relative z-10 p-8 md:p-16 max-w-4xl">
            <h1
                class="text-5xl md:text-7xl lg:text-8xl font-serif text-white mb-6 tracking-wider leading-tight animate-fade-up">
                FLOWER <br /> STUDIO
            </h1>
            <p
                class="text-xs md:text-sm text-gray-300 max-w-md tracking-[0.2em] leading-relaxed mb-12 uppercase border-l border-accent pl-6 animate-fade-up-delay">
                Decorate our everyday life with flowers.
                Trust us and we will create a real fairy tale.
            </p>
        </div>

        <!-- CTA -->
        <button @click="scrollToCatalog()"
            class="absolute bottom-12 md:bottom-24 right-8 md:right-[28%] bg-accent text-white px-12 py-6 flex items-center gap-4 hover:bg-red-900 transition-all z-20 group animate-fade-up-delay-2">
            <span class="uppercase tracking-[0.2em] text-xs font-bold">Go to Directory</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 group-hover:translate-x-2 transition-transform"
                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
            </svg>
        </button>
    </div>

    <!-- Right sidebar preview -->
    <div class="hidden md:block w-1/4 h-full bg-secondary relative border-l border-white/5">
        <div class="absolute top-0 right-0 w-full h-2/3 bg-accent/10">
            <img src="https://images.unsplash.com/photo-1591886960571-74d43a9d4166?q=80&w=1974&auto=format&fit=crop"
                alt="Preview" class="w-full h-full object-cover opacity-80" />
            <div class="absolute inset-0 bg-accent/20 mix-blend-multiply"></div>
        </div>
        <!-- Page counter decoration -->
        <div class="absolute bottom-12 right-12 text-xs text-dim tracking-widest" style="writing-mode: vertical-rl;">
            01 — 05
        </div>
    </div>
</section>

<!-- ===========================  NAVBAR  =========================== -->
<nav :class="isScrolled
  ? 'bg-primary/95 backdrop-blur-md py-4 border-b border-white/5'
  : 'bg-transparent py-8'" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300">
    <div class="px-6 md:px-12 flex justify-between items-center">

        <!-- Hamburger -->
        <button class="text-white hover:text-accent transition-colors" aria-label="Menu">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>

        <!-- Logo (visible on scroll) -->
        <div class="absolute left-1/2 -translate-x-1/2 transition-opacity duration-300"
            :class="isScrolled ? 'opacity-100' : 'opacity-0'">
            <span class="font-serif text-xl tracking-widest text-white font-bold">VELVET</span>
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-6 md:gap-8 text-white">
            <!-- Wishlist -->
            <button class="hover:text-accent transition-colors hidden md:block" aria-label="Wishlist">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M4.318 6.318a4.5 4.5 0 016.364 0L12 7.636l1.318-1.318a4.5 4.5 0 116.364 6.364l-7.5 7.5a.75.75 0 01-1.06 0l-7.5-7.5a4.5 4.5 0 010-6.364z" />
                </svg>
            </button>
            <!-- Search -->
            <button class="hover:text-accent transition-colors hidden md:block" aria-label="Search">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 1110.5 3a7.5 7.5 0 016.15 13.65z" />
                </svg>
            </button>
            <!-- Cart Toggle -->
            <button @click="isCartOpen = true" class="hover:text-accent transition-colors relative"
                aria-label="Open cart">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0" />
                </svg>
                <!-- Badge -->
                <span x-show="cartCount > 0" x-text="cartCount" x-cloak
                    class="absolute -top-2 -right-2 bg-accent text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center"></span>
            </button>
        </div>
    </div>
</nav>
